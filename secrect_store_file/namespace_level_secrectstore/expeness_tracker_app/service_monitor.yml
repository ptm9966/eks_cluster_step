apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: expense-tracker-monitor
  namespace: monitoring
  labels:
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      app: expense-tracker
      environment: dev
  namespaceSelector:
    matchNames:
      - default
  endpoints:
    - port: http
      path: /metrics
      interval: 15s